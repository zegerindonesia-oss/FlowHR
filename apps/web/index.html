<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowHR - HR Management System</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#7c3aed",
            "primary-light": "#a78bfa",
            "accent": "#f472b6",
            "accent-warm": "#fb923c",
          },
          fontFamily: {
            "display": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.25rem", "3xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .filled-icon {
      font-variation-settings: 'FILL' 1;
    }

    /* Glassmorphism utilities */
    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .glass-sidebar {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-right: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    /* Animated gradient background */
    .gradient-bg {
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 15%, #e8eaf6 30%, #e0f2f1 50%, #fff3e0 70%, #fce4ec 85%, #f3e5f5 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Decorative blobs */
    .blob-1 {
      position: fixed;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f472b6, #a78bfa);
      opacity: 0.3;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .blob-2 {
      position: fixed;
      bottom: -150px;
      left: -100px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #34d399);
      opacity: 0.25;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .blob-3 {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fb923c, #f472b6);
      opacity: 0.15;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #7c3aed, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Purple gradient button */
    .btn-gradient {
      background: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
      color: white;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }

    .btn-gradient:hover {
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.45);
      transform: translateY(-1px);
    }

    /* Smooth scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, 0.2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(124, 58, 237, 0.3);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
